    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
        }

        #console {
            flex: 1;
            padding: 20px;
            overflow-y: scroll;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #input-line {
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            background-color: #000;
            border-top: 1px solid #fff;
        }

        #prompt {
            color: #fff;
            margin-bottom: 5px;
        }

        #user-input-container {
            display: flex;
            align-items: center;
        }

        #user-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            width: 1px;
            min-width: 1px;
            max-width: 100%;
            caret-color: transparent;
        }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #fff;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .error {
            color: #f00;
        }

        .warning {
            color: #ff0;
        }

        .loading-bar {
            color: #fff;
            margin: 5px 0;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #fff;
        }
    </style>
</head>
<body>
    <div id="console"></div>
    <div id="input-line">
        <span id="prompt">write "./HappyBirthday.sh"</span>
        <div id="user-input-container">
            <input type="text" id="user-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <span id="cursor"></span>
        </div>
    </div>

    <script>

        const kernelPanicText = `kernel: BUG: unable to handle kernel NULL pointer dereference at (null) [1]

        let waitingForAnyKey = false;

        function typeText(text, callback) {
            const lines = text.split('\n');
            let lineIndex = 0;

            function typeLine() {
                if (lineIndex < lines.length) {
                    const line = lines[lineIndex];
                    const span = document.createElement('span');
                    
                    if (line.includes('[ WARNING ]')) {
                        span.className = 'warning';
                    }
                    
                    span.textContent = line + '\n';
                    consoleDiv.appendChild(span);
                    consoleDiv.scrollTop = consoleDiv.scrollHeight;
                    lineIndex++;
                    setTimeout(typeLine, 65); // Увеличена скорость на 30% (50ms * 1.3 = 65ms)
                } else if (callback) {
                    callback();
                }
            }

            typeLine();
        }

        function animateLoadingBar(duration, callback, stopAt = 100) {
            const loadingLine = document.createElement('div');
            loadingLine.className = 'loading-bar';
            consoleDiv.appendChild(loadingLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;

            const startTime = Date.now();
            const totalDots = 20;

            function updateLoading() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, stopAt / 100);
                
                const filledDots = Math.floor(progress * totalDots);
                const emptyDots = totalDots - filledDots;
                
                const percentage = Math.floor(progress * stopAt);
                loadingLine.textContent = `[${'#'.repeat(filledDots)}${'.'.repeat(emptyDots)}] ${percentage}%`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;

                if (progress < stopAt / 100) {
                    requestAnimationFrame(updateLoading);
                } else if (callback) {
                    callback();
                }
            }

            updateLoading();
        }

        function animateLoadingBarSlow(duration, callback) {
            const loadingLine = document.createElement('div');
            loadingLine.className = 'loading-bar';
            consoleDiv.appendChild(loadingLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;

            const startTime = Date.now();
            const totalDots = 20;

            function updateLoading() {
                const elapsed = Date.now() - startTime;
                
                // Используем ease-out функцию для замедления к концу
                const t = Math.min(elapsed / duration, 1);
                const progress = 1 - Math.pow(1 - t, 3); // cubic ease-out
                
                const filledDots = Math.floor(progress * totalDots);
                const emptyDots = totalDots - filledDots;
                
                const percentage = (progress * 99.9).toFixed(1);
                loadingLine.textContent = `[${'#'.repeat(filledDots)}${'.'.repeat(emptyDots)}] ${percentage}%`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;

                if (t < 1) {
                    requestAnimationFrame(updateLoading);
                } else if (callback) {
                    callback();
                }
            }

            updateLoading();
        }

        userInput.addEventListener('input', function() {
            // Создаем временный элемент для измерения ширины текста
            const tempSpan = document.createElement('span');
            tempSpan.style.font = getComputedStyle(this).font;
            tempSpan.style.visibility = 'hidden';
            tempSpan.style.position = 'absolute';
            tempSpan.textContent = this.value || ' ';
            document.body.appendChild(tempSpan);
            
            const textWidth = tempSpan.offsetWidth;
            document.body.removeChild(tempSpan);
            
            // Устанавливаем ширину поля ввода с небольшим запасом
            this.style.width = Math.max(1, textWidth + 2) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = userInput.value.trim();
                userInput.value = '';
                userInput.style.width = '1px';

                if (command === './HappyBirthday.sh') {
                    inputLine.style.display = 'none';
                    startBootSequence();
                } else {
                    const errorLine = document.createElement('div');
                    errorLine.className = 'error';
                    errorLine.textContent = 'Error: Access denied';
                    consoleDiv.appendChild(errorLine);
                    consoleDiv.scrollTop = consoleDiv.scrollHeight;
                }
            }
        });

        document.addEventListener('keydown', function(e) {
            if (waitingForAnyKey) {
                waitingForAnyKey = false;
                startKernelPanic();
            }
        });

        function startBootSequence() {
            typeText(bootText, function() {
                setTimeout(function() {
                    animateLoadingBar(4000, function() {
                        consoleDiv.appendChild(document.createElement('br'));
                        typeText(congratulationsText, function() {
                            waitingForAnyKey = true;
                        });
                    });
                }, 500);
            });
        }

        function startKernelPanic() {
            consoleDiv.appendChild(document.createElement('br'));
            const loadLine = document.createElement('div');
            loadLine.textContent = 'Load "код на cyberpank2077.sl"';
            consoleDiv.appendChild(loadLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            animateLoadingBarSlow(10000, function() {
                consoleDiv.appendChild(document.createElement('br'));
                const panicText = document.createElement('div');
                panicText.style.color = '#f00';
                consoleDiv.appendChild(panicText);
                
                // Выводим kernel panic построчно
                const lines = kernelPanicText.split('\n');
                let lineIndex = 0;
                
                function typePanicLine() {
                    if (lineIndex < lines.length) {
                        const line = lines[lineIndex];
                        const span = document.createElement('span');
                        span.style.color = '#f00';
                        span.textContent = line + '\n';
                        panicText.appendChild(span);
                        consoleDiv.scrollTop = consoleDiv.scrollHeight;
                        lineIndex++;
                        setTimeout(typePanicLine, 30); // Быстрая скорость для kernel panic
                    }
                }
                
                typePanicLine();
            });
        }

        // Фокус на поле ввода при загрузке
        userInput.focus();
        
        // Сохранять фокус при клике в любом месте
        document.addEventListener('click', function() {
            if (inputLine.style.display !== 'none') {
                userInput.focus();
            }
        });

        // Поддержка прокрутки с помощью колёсика мыши
        document.addEventListener('wheel', function(e) {
            if (consoleDiv.scrollHeight > consoleDiv.clientHeight) {
                e.preventDefault();
                consoleDiv.scrollTop += e.deltaY;
            }
        }, { passive: false });
